<div class="min-h-screen bg-background p-6">
  <div class="mx-auto flex w-full max-w-6xl flex-col gap-8">
    <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div >
        <lib-page-title title="Tableau de bord" />
        <lib-page-subtitle title="Vue d'ensemble de vos factures et relances" />
      </div>

      <lib-button prime_icon_class="pi pi-plus" label="Ajouter une facture"/>
    </header>

    <section class="flex justify-between gap-4">
      <lib-kpi-card title="Total en retard" value="{{ dashboardOrchestrator.totalAmountBillLate() }} €" prime_icon="pi pi-exclamation-circle" [variant]="KpiCardVariant.DANGER"/>
      <lib-kpi-card title="Factures en retard" value="{{ dashboardOrchestrator.totalBillLate() }}" prime_icon="pi pi-exclamation-triangle" [variant]="KpiCardVariant.DANGER"/>
      <lib-kpi-card title="À encaisser ce mois" value="{{ dashboardOrchestrator.toCashoutThisMonth() }} €" prime_icon="pi pi-clock" [variant]="KpiCardVariant.WARNING"/>
      <lib-kpi-card title="Factures en cours" value="{{ dashboardOrchestrator.numberBillPending() }}" prime_icon="pi pi-file" [variant]="KpiCardVariant.NEUTRAL"/>
    </section>

    <lib-table [value]="dashboardOrchestrator.billsLineTableData()" >
        <ng-template #header>
            <tr class="">
                <th>Client</th>
                <th>Chantier</th>
                <th>Montant</th>
                <th>Echeance</th>
                <th>Statut</th>
                <th>Prochaine Relance</th>
                <th>Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-bills>
            <tr>
                <td>{{ bills.clientName }}</td>
                <td>{{ bills.chantierName }}</td>
                <td>{{ bills.amount }} €</td>
                <td>{{ bills.dueDate }}</td>
                <td>{{ bills.status }}</td>
                <td>_</td>
                <td></td>
            </tr>
        </ng-template>
  </lib-table>
