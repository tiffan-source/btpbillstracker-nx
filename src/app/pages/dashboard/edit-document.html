<form [formGroup]="parentForm()">
    @if (previousDocumentExist()) {
        <div class="flex flex-col gap-2">
            <p>Un document existe déjà pour cette facture.</p>
            <p>En téléchargeant un nouveau document, vous remplacerez l'ancien.</p>
            <lib-button label="Supprimer l'ancien document" variant="danger" />
        </div>
        <lib-divider/>
    }
    <div class="flex flex-col">
        <lib-label for="pdf-facture" label="PDF de la facture (optionnel)"></lib-label>
        <lib-input-file id="pdf-facture" (fileSelected)="onFileChange($event)"></lib-input-file>
    </div>
</form>
