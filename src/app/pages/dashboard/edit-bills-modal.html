<lib-modal [visible]="billId() !== null" width="40rem" header="Modifier mes informations" (closed)="closeModal()">

    <lib-tabs 
      [items]="editionSteps" 
      [scrollable]="true">
      
      <!-- CUSTOMISATION DE L'EN-TÊTE -->
      <ng-template #tabHeader let-step>
        <div class="flex items-center gap-2">
            <span [class]="step.primeIcon"></span>
            <span>{{ step.stepName }}</span>
        </div>
      </ng-template>

      <!-- CUSTOMISATION DU CONTENU (Injection de votre propre composant) -->
      <ng-template #tabContent let-step let-i="index">
        @switch (step.step) {
            @case ("client") {
                <app-edit-client [parentForm]="billForm"></app-edit-client>
            }
            @case ("chantier") {
                <app-edit-chantier [parentForm]="billForm"></app-edit-chantier>
            }
            @case ("details") {
                <app-edit-detail [parentForm]="billForm"></app-edit-detail>
            }
            @case ("document") {
                <app-edit-document [previousDocumentExist]="pdfExistOnBill()" [parentForm]="billForm"></app-edit-document>
            }
        }
      </ng-template>

    </lib-tabs>

      <ng-template #footer>
            <lib-button variant="secondary" (click)="closeModal()" label="Annuler" styleClass="p-button-text"></lib-button>
            <lib-button [loading]="this.editBillOrchestrator.isProcessing()" (click)="editBill()" label="Enregistrer"></lib-button>
      </ng-template>    
</lib-modal>
