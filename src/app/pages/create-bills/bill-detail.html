
<lib-card title="Informations de la facture" subtitle="Renseignez les détails de la facture">
    <form [formGroup]="parentForm()">

            <!-- Montant & Date d'échéance -->
            <div class="flex gap-4 mb-4">
                <div class="flex flex-col flex-1">
                    <lib-label for="montant" label="Montant TTC ($)"></lib-label>
                    <lib-input [formControlName]="BillFormField.AmountTTC" type="number" placeholder="0,00" id="montant"></lib-input>
                    
                </div>
                <div class="flex flex-col flex-1">
                    <lib-label for="echeance" label="Date d'échéance"></lib-label>
                    <lib-date-picker [formControlName]="BillFormField.DueDate" id="echeance" placeholder="mm / dd / yyyy"></lib-date-picker>
                </div>
            </div>

            <!-- Numero de facture & Type -->
            <div class="flex gap-4 mb-4">
                <div class="flex flex-col flex-1">
                    <lib-label for="facture" label="Numero de facture"></lib-label>
                    <lib-input [formControlName]="BillFormField.InvoiceNumber" type="text" placeholder="FAC-001" id="facture"></lib-input>
                </div>
                <div class="flex flex-col flex-1">
                    <lib-label for="type" label="Type"></lib-label>
                    <lib-input-select [options]="typeOptions" [formControlName]="BillFormField.Type" id="type" optionLabel="label" optionValue="value" placeholder="Selectionner un type"></lib-input-select>
                </div>
            </div>

            <!-- Méthode de paiement -->
            <div class="flex flex-col mb-4">
                <lib-label for="paiement" label="Méthode de paiement prevu"></lib-label>
                <lib-input-select [options]="paymentModeOptions" placeholder="Selectionner le mode de paiement" optionLabel="label" optionValue="value" [formControlName]="BillFormField.PaymentMode" id="paiement"></lib-input-select>
            </div>
    </form>

    <div card-footer>
        <div class="flex justify-between items-center">
            <lib-button variant="secondary" label="Précédent" (click)="goPrevious.emit()"></lib-button>
            <lib-button [disable]="!isStepValid()" label="Suivant" (click)="goNext.emit()"></lib-button>
        </div>
    </div>
</lib-card>
