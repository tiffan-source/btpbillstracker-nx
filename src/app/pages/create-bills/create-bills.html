<div class="max-w-4xl flex flex-col gap-6 mx-auto my-8">

    <div>
        <lib-page-title title="Créer une facture"></lib-page-title>
        <lib-page-subtitle title="Renseignez les informations de la facture à suivre"></lib-page-subtitle>
    </div>

    @switch (steps()) {
        @case('client') {
            <app-create-or-select-client (goNext)="nextStep()" [parentForm]="billForm"/>
        }
        @case('chantier') {
            <app-create-or-select-chantier (goNext)="nextStep()" (goPrevious)="previousStep()" [parentForm]="billForm"/>
        }
        @case ('details') {
            <app-bill-detail (goNext)="nextStep()" (goPrevious)="previousStep()" [parentForm]="billForm"/>
        }
        @case ('pdf') {
            <app-upload-pdf (goNext)="nextStep()" (goPrevious)="previousStep()" [parentForm]="billForm"/>
        }
        @case ('relance') {
            <app-relance-selection (goPrevious)="previousStep()" [isCreatingBill]="billsOrchestrator.isProcessing()" (done)="createBill()" [parentForm]="billForm"/>
        }
    }
</div>
